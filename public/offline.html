<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sem conexão — Futura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8fafc;
      color: #1e293b;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #64748b; }
  </style>
</head>
<body>
  <h1>Sem conexão</h1>
  <p>Verifique sua internet e tente novamente.</p>
  <button onclick="window.location.reload()"
    style="margin-top:24px;padding:10px 24px;background:#1e293b;
           color:white;border:none;border-radius:6px;cursor:pointer;">
    Tentar novamente
  </button>
</body>
</html>
